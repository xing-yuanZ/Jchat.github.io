<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JChat · 即时聊天</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部导航栏 */
        .top-nav {
            background: white;
            border-bottom: 1px solid #eef2f6;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .nav-item {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 500;
            color: #5b677b;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }

        .nav-item:hover {
            color: #007aff;
        }

        .nav-item.active {
            color: #007aff;
            border-bottom-color: #007aff;
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: 0.2s;
        }

        .friend-item, .contact-item, .user-search-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: #e9ecef;
            border-radius: 50%;
            object-fit: cover;
        }

        .info {
            flex: 1;
        }

        .name {
            font-weight: 600;
            font-size: 16px;
        }

        button {
            background: #007aff;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
        }

        button.danger {
            background: #ff3b30;
        }

        .input-group {
            margin: 12px 0;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15px;
            background: #f9fafb;
        }

        .messages-area {
            max-height: 55vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
        }

        .message.sent {
            align-self: flex-end;
            background: #007aff;
            color: white;
        }

        .message.received {
            align-self: flex-start;
            background: #e9ecef;
            color: black;
        }

        .profile-header {
            display: flex;
            gap: 24px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .profile-avatar-lg {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ddd;
            object-fit: cover;
        }

        h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
        }

        .announcement-banner {
            background: #fff7e5;
            border-left: 4px solid #ffc107;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eef2f6;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .main-content {
                padding: 16px;
            }
            .nav-item {
                padding: 12px 16px;
                font-size: 14px;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ---------- 你的 Supabase 配置（请确保正确） ----------
    const SUPABASE_URL = 'https://cxilodvbdhtxtrldoswl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_36lHK24HL6drOmuhSTTv8g_w2n0fU5H';
    // -----------------------------------------------------

    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const EMAIL_SUFFIX = '@jchat.local';

    let currentUser = null;
    let currentProfile = null;
    let currentView = 'chat';      // chat, friends, discover, profile, settings, admin
    let currentChatUser = null;
    let messagesSubscription = null;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    async function ensureProfile(user, username) {
        const { data } = await _supabase.from('public_profiles').select('id').eq('id', user.id).maybeSingle();
        if (!data) {
            await _supabase.from('public_profiles').insert({
                id: user.id,
                email: user.email,
                display_name: username,
                is_admin: false,
                is_muted: false,
                bio: ''
            });
        }
    }

    // 渲染整个应用
    async function render() {
        const app = document.getElementById('app');
        if (!currentUser) {
            app.innerHTML = renderAuth();
            attachAuthEvents();
            return;
        }
        // 获取最新的 profile
        const { data: profile } = await _supabase.from('public_profiles').select('*').eq('id', currentUser.id).single();
        currentProfile = profile;

        let mainContent = '';
        if (currentView === 'chat') mainContent = await renderChatView();
        else if (currentView === 'friends') mainContent = await renderFriendsView();
        else if (currentView === 'discover') mainContent = await renderDiscoverView();
        else if (currentView === 'profile') mainContent = await renderProfileView();
        else if (currentView === 'settings') mainContent = renderSettingsView();
        else if (currentView === 'admin' && currentProfile?.is_admin) mainContent = await renderAdminView();

        const topNavHtml = renderTopNav();
        app.innerHTML = `
            ${topNavHtml}
            <div class="main-content" id="main-scroll">${mainContent}</div>
        `;

        // 绑定导航点击
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => {
                currentView = el.dataset.view;
                currentChatUser = null;
                render();
            });
        });

        // 子页面事件绑定
        if (currentView === 'chat' && currentChatUser) {
            attachChatEvents();
            subscribeToMessages();
        }
        if (currentView === 'friends') attachFriendEvents();
        if (currentView === 'discover') attachDiscoverEvents();
        if (currentView === 'settings') attachSettingsEvents();
        if (currentView === 'admin' && currentProfile?.is_admin) attachAdminEvents();
    }

    function renderTopNav() {
        const items = [
            { view: 'chat', label: '💬 聊天' },
            { view: 'friends', label: '👥 好友' },
            { view: 'discover', label: '🌟 发现' },
            { view: 'profile', label: '😀 我的主页' },
            { view: 'settings', label: '⚙️ 设置' }
        ];
        if (currentProfile?.is_admin) items.push({ view: 'admin', label: '🔧 管理面板' });
        return `
            <div class="top-nav">
                ${items.map(item => `
                    <div class="nav-item ${currentView === item.view ? 'active' : ''}" data-view="${item.view}">${item.label}</div>
                `).join('')}
                <div style="margin-left: auto; display: flex; align-items: center;">
                    <span style="font-size:14px; color:#5b677b;">${escapeHtml(currentProfile?.display_name || '')}</span>
                    <button id="logout-top" style="background:#ef4444; margin-left:12px; padding:6px 14px;">退出</button>
                </div>
            </div>
        `;
    }

    // 登录/注册界面（与之前相同）
    function renderAuth() {
        return `
            <div style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
                <div style="background:white; border-radius:40px; padding:32px; width:100%; max-width:400px;">
                    <h2 style="text-align:center; margin-bottom:24px;">JChat</h2>
                    <div id="auth-error" style="color:red; margin-bottom:12px;"></div>
                    <input type="text" id="username" placeholder="用户名" style="margin-bottom:12px;">
                    <input type="password" id="password" placeholder="密码" style="margin-bottom:20px;">
                    <button id="auth-submit" style="width:100%;">登录</button>
                    <div id="switch-auth" style="text-align:center; margin-top:16px; color:#007aff; cursor:pointer;">没有账号？注册</div>
                </div>
            </div>
        `;
    }

    let isLogin = true;
    function attachAuthEvents() {
        const submit = document.getElementById('auth-submit');
        const switchBtn = document.getElementById('switch-auth');
        const errorDiv = document.getElementById('auth-error');

        async function doAuth() {
            errorDiv.innerText = '';
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { errorDiv.innerText = '请填写用户名和密码'; return; }
            if (isLogin) {
                const { data: profile } = await _supabase.from('public_profiles').select('email').eq('display_name', username).maybeSingle();
                if (!profile) { errorDiv.innerText = '用户名不存在'; return; }
                const { error } = await _supabase.auth.signInWithPassword({ email: profile.email, password });
                if (error) { errorDiv.innerText = error.message; return; }
                const { data: { user } } = await _supabase.auth.getUser();
                currentUser = user;
                await ensureProfile(currentUser, username);
                render();
            } else {
                const { data: existing } = await _supabase.from('public_profiles').select('id').eq('display_name', username).maybeSingle();
                if (existing) { errorDiv.innerText = '用户名已存在'; return; }
                const randomEmail = crypto.randomUUID() + EMAIL_SUFFIX;
                const { data, error } = await _supabase.auth.signUp({ email: randomEmail, password });
                if (error) { errorDiv.innerText = error.message; return; }
                if (data.user) {
                    currentUser = data.user;
                    await _supabase.from('public_profiles').insert({
                        id: currentUser.id,
                        email: randomEmail,
                        display_name: username,
                        is_admin: false,
                        is_muted: false,
                        bio: ''
                    });
                    render();
                } else {
                    errorDiv.innerText = '注册失败，请重试';
                }
            }
        }
        submit.onclick = doAuth;
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            submit.innerText = isLogin ? '登录' : '注册';
            switchBtn.innerText = isLogin ? '没有账号？注册' : '已有账号？登录';
            errorDiv.innerText = '';
        };
        // 退出按钮在渲染后绑定
    }

    // 退出逻辑在全局渲染后绑定
    function bindLogout() {
        const logoutBtn = document.getElementById('logout-top');
        if (logoutBtn) {
            logoutBtn.onclick = async () => {
                await _supabase.auth.signOut();
                currentUser = null;
                currentProfile = null;
                if (messagesSubscription) messagesSubscription.unsubscribe();
                render();
            };
        }
    }

    // 聊天视图
    async function renderChatView() {
        // 获取好友列表（accepted）
        const { data: friendships } = await _supabase
            .from('friendships')
            .select('user_id, friend_id')
            .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
            .eq('status', 'accepted');
        let friendIds = [];
        friendships?.forEach(f => {
            if (f.user_id === currentUser.id) friendIds.push(f.friend_id);
            else friendIds.push(f.user_id);
        });
        let friends = [];
        if (friendIds.length) {
            const { data } = await _supabase.from('public_profiles').select('id, display_name, avatar_url').in('id', friendIds);
            friends = data || [];
        }
        const friendListHtml = friends.map(f => `
            <div class="contact-item" data-user-id="${f.id}" data-name="${escapeHtml(f.display_name)}">
                <img class="avatar" src="${f.avatar_url || 'https://via.placeholder.com/48'}" onerror="this.src='https://via.placeholder.com/48'">
                <div class="info"><div class="name">${escapeHtml(f.display_name)}</div></div>
            </div>
        `).join('');
        const chatAreaHtml = currentChatUser ? await renderChatArea() : '<div class="card" style="text-align:center; color:#888;">选择一个好友开始聊天</div>';
        return `
            <div style="display:flex; flex-direction:column; gap:20px;">
                <div class="card">
                    <div style="font-weight:600; margin-bottom:12px;">好友列表</div>
                    ${friendListHtml || '<div style="padding:12px; text-align:center;">暂无好友，请去“发现”添加</div>'}
                </div>
                ${chatAreaHtml}
            </div>
        `;
    }

    async function renderChatArea() {
        if (!currentChatUser) return '';
        const { data: messages } = await _supabase
            .from('messages')
            .select('*')
            .or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${currentChatUser.id}),and(from_user_id.eq.${currentChatUser.id},to_user_id.eq.${currentUser.id})`)
            .order('created_at', { ascending: true });
        const msgsHtml = messages?.map(m => `
            <div class="message ${m.from_user_id === currentUser.id ? 'sent' : 'received'}">
                ${escapeHtml(m.content)}
            </div>
        `).join('') || '';
        return `
            <div class="card">
                <div style="font-weight:600; margin-bottom:16px;">与 ${escapeHtml(currentChatUser.display_name)} 的聊天</div>
                <div class="messages-area" id="chat-messages-area">${msgsHtml}</div>
                <div style="display:flex; gap:12px;">
                    <input type="text" id="chat-input" placeholder="输入消息..." style="flex:1;">
                    <button id="chat-send">发送</button>
                </div>
            </div>
        `;
    }

    function attachChatEvents() {
        document.querySelectorAll('.contact-item').forEach(el => {
            el.onclick = () => {
                const userId = el.dataset.userId;
                const name = el.dataset.name;
                currentChatUser = { id: userId, display_name: name };
                render();
            };
        });
        const sendBtn = document.getElementById('chat-send');
        const input = document.getElementById('chat-input');
        if (sendBtn && input) {
            const send = async () => {
                const content = input.value.trim();
                if (!content || !currentChatUser) return;
                if (currentProfile?.is_muted) { alert('你已被禁言'); return; }
                await _supabase.from('messages').insert({
                    from_user_id: currentUser.id,
                    to_user_id: currentChatUser.id,
                    content
                });
                input.value = '';
                const area = document.getElementById('chat-messages-area');
                if (area) {
                    const div = document.createElement('div');
                    div.className = 'message sent';
                    div.innerText = content;
                    area.appendChild(div);
                    area.scrollTop = area.scrollHeight;
                }
            };
            sendBtn.onclick = send;
            input.onkeypress = e => { if (e.key === 'Enter') send(); };
        }
    }

    function subscribeToMessages() {
        if (messagesSubscription) messagesSubscription.unsubscribe();
        messagesSubscription = _supabase
            .channel('new-message')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `to_user_id=eq.${currentUser.id}` }, payload => {
                if (currentChatUser && payload.new.from_user_id === currentChatUser.id) {
                    const area = document.getElementById('chat-messages-area');
                    if (area) {
                        const div = document.createElement('div');
                        div.className = 'message received';
                        div.innerText = payload.new.content;
                        area.appendChild(div);
                        area.scrollTop = area.scrollHeight;
                    }
                }
            })
            .subscribe();
    }

    // 好友视图
    async function renderFriendsView() {
        // 待处理请求
        const { data: requests } = await _supabase.from('friendships').select('id, user_id, status').eq('friend_id', currentUser.id).eq('status', 'pending');
        let requestUsers = [];
        if (requests?.length) {
            const ids = requests.map(r => r.user_id);
            const { data } = await _supabase.from('public_profiles').select('id, display_name').in('id', ids);
            requestUsers = data || [];
        }
        const requestsHtml = requestUsers.map(r => `
            <div class="friend-item" data-request-id="${requests.find(req => req.user_id === r.id).id}" data-user-id="${r.id}">
                <div class="info"><div class="name">${escapeHtml(r.display_name)} 请求添加好友</div></div>
                <button class="accept-friend">接受</button>
                <button class="reject-friend" style="background:#aaa;">拒绝</button>
            </div>
        `).join('');
        // 已有好友
        const { data: friendships } = await _supabase.from('friendships').select('user_id, friend_id').or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`).eq('status', 'accepted');
        let fids = [];
        friendships?.forEach(f => {
            if (f.user_id === currentUser.id) fids.push(f.friend_id);
            else fids.push(f.user_id);
        });
        let friends = [];
        if (fids.length) {
            const { data } = await _supabase.from('public_profiles').select('id, display_name, avatar_url').in('id', fids);
            friends = data || [];
        }
        const friendsHtml = friends.map(f => `
            <div class="friend-item">
                <img class="avatar" src="${f.avatar_url || 'https://via.placeholder.com/48'}">
                <div class="info"><div class="name">${escapeHtml(f.display_name)}</div></div>
            </div>
        `).join('');
        return `
            <div class="card"><h3>好友请求</h3>${requestsHtml || '<div>暂无</div>'}</div>
            <div class="card"><h3>我的好友</h3>${friendsHtml || '<div>暂无好友</div>'}</div>
            <div class="card"><h3>添加好友</h3><input id="add-friend-name" placeholder="输入用户名"><button id="search-add">搜索并添加</button></div>
        `;
    }

    function attachFriendEvents() {
        document.querySelectorAll('.accept-friend').forEach(btn => {
            btn.onclick = async () => {
                const requestId = btn.closest('.friend-item').dataset.requestId;
                await _supabase.from('friendships').update({ status: 'accepted' }).eq('id', requestId);
                render();
            };
        });
        document.querySelectorAll('.reject-friend').forEach(btn => {
            btn.onclick = async () => {
                const requestId = btn.closest('.friend-item').dataset.requestId;
                await _supabase.from('friendships').delete().eq('id', requestId);
                render();
            };
        });
        const searchBtn = document.getElementById('search-add');
        if (searchBtn) {
            searchBtn.onclick = async () => {
                const username = document.getElementById('add-friend-name').value.trim();
                if (!username) return;
                const { data: user } = await _supabase.from('public_profiles').select('id').eq('display_name', username).maybeSingle();
                if (!user) { alert('用户不存在'); return; }
                if (user.id === currentUser.id) { alert('不能添加自己'); return; }
                await _supabase.from('friendships').insert({ user_id: currentUser.id, friend_id: user.id, status: 'pending' });
                alert('好友申请已发送');
                render();
            };
        }
    }

    // 发现视图
    async function renderDiscoverView() {
        const { data: ann } = await _supabase.from('announcements').select('content').order('created_at', { ascending: false }).limit(1);
        const announcement = ann?.[0]?.content || '暂无公告';
        return `
            <div class="announcement-banner">📢 ${escapeHtml(announcement)}</div>
            <div class="card"><h3>🔍 查找用户</h3><input id="search-user" placeholder="用户名"><button id="do-search">搜索</button><div id="search-results" style="margin-top:16px;"></div></div>
        `;
    }

    function attachDiscoverEvents() {
        const searchBtn = document.getElementById('do-search');
        if (searchBtn) {
            searchBtn.onclick = async () => {
                const keyword = document.getElementById('search-user').value.trim();
                if (!keyword) return;
                const { data: users } = await _supabase.from('public_profiles').select('id, display_name, avatar_url').ilike('display_name', `%${keyword}%`).neq('id', currentUser.id);
                const container = document.getElementById('search-results');
                if (!users?.length) { container.innerHTML = '<div>未找到用户</div>'; return; }
                container.innerHTML = users.map(u => `
                    <div class="user-search-item" data-id="${u.id}">
                        <img class="avatar" src="${u.avatar_url || 'https://via.placeholder.com/48'}">
                        <div class="info">${escapeHtml(u.display_name)}</div>
                        <button class="add-from-search">➕ 加好友</button>
                        <button class="view-profile">👤 主页</button>
                    </div>
                `).join('');
                document.querySelectorAll('.add-from-search').forEach(btn => {
                    btn.onclick = async () => {
                        const userId = btn.closest('.user-search-item').dataset.id;
                        await _supabase.from('friendships').insert({ user_id: currentUser.id, friend_id: userId, status: 'pending' });
                        alert('已发送好友申请');
                    };
                });
                document.querySelectorAll('.view-profile').forEach(btn => {
                    btn.onclick = () => {
                        const userId = btn.closest('.user-search-item').dataset.id;
                        alert('查看用户主页功能即将完善，可通过“我的主页”查看自己');
                    };
                });
            };
        }
    }

    // 我的主页
    async function renderProfileView() {
        if (!currentProfile) return '<div class="loading">加载中</div>';
        return `
            <div class="card">
                <div class="profile-header">
                    <img class="profile-avatar-lg" src="${currentProfile.avatar_url || 'https://via.placeholder.com/100'}" onerror="this.src='https://via.placeholder.com/100'">
                    <div>
                        <div class="name" style="font-size:26px;">${escapeHtml(currentProfile.display_name)}</div>
                        <div style="color:#5b677b;">${currentProfile.is_admin ? '管理员' : '普通用户'}</div>
                    </div>
                </div>
                <div><strong>📝 简介</strong><br>${escapeHtml(currentProfile.bio || '这个人很懒，什么都没写')}</div>
                <div style="margin-top:12px;"><strong>📅 加入时间</strong><br>${new Date(currentProfile.created_at).toLocaleDateString()}</div>
                ${currentProfile.is_muted ? '<div style="margin-top:12px; color:red;">⛔ 当前处于禁言状态</div>' : ''}
            </div>
        `;
    }

    // 设置页面
    function renderSettingsView() {
        return `
            <div class="card"><h3>更改昵称</h3><input id="new-name" value="${escapeHtml(currentProfile?.display_name || '')}" placeholder="新昵称"><button id="update-name">保存</button></div>
            <div class="card"><h3>修改密码</h3><input type="password" id="old-pwd" placeholder="当前密码"><input type="password" id="new-pwd" placeholder="新密码"><button id="update-pwd">更新密码</button></div>
            <div class="card"><h3>个人简介</h3><textarea id="bio-text" rows="2">${escapeHtml(currentProfile?.bio || '')}</textarea><button id="update-bio">保存简介</button></div>
            <div class="card"><h3>上传头像</h3><input type="file" id="avatar-file" accept="image/*"><button id="upload-avatar">上传</button></div>
            <div class="card"><h3>危险区域</h3><button id="delete-account" class="danger">永久删除账户</button></div>
        `;
    }

    function attachSettingsEvents() {
        document.getElementById('update-name')?.addEventListener('click', async () => {
            const newName = document.getElementById('new-name').value.trim();
            if (!newName) return;
            await _supabase.from('public_profiles').update({ display_name: newName }).eq('id', currentUser.id);
            alert('昵称已更新');
            render();
        });
        document.getElementById('update-pwd')?.addEventListener('click', async () => {
            const old = document.getElementById('old-pwd').value;
            const newPwd = document.getElementById('new-pwd').value;
            if (!old || !newPwd) return;
            const { error } = await _supabase.auth.updateUser({ password: newPwd });
            if (error) alert(error.message);
            else alert('密码已修改，请重新登录');
        });
        document.getElementById('update-bio')?.addEventListener('click', async () => {
            const bio = document.getElementById('bio-text').value;
            await _supabase.from('public_profiles').update({ bio }).eq('id', currentUser.id);
            alert('简介已更新');
            render();
        });
        document.getElementById('upload-avatar')?.addEventListener('click', async () => {
            const file = document.getElementById('avatar-file').files[0];
            if (!file) return;
            const ext = file.name.split('.').pop();
            const path = `${currentUser.id}/${Date.now()}.${ext}`;
            const { error: upErr } = await _supabase.storage.from('avatars').upload(path, file);
            if (upErr) { alert(upErr.message); return; }
            const { data: { publicUrl } } = _supabase.storage.from('avatars').getPublicUrl(path);
            await _supabase.from('public_profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
            alert('头像已更新');
            render();
        });
        document.getElementById('delete-account')?.addEventListener('click', async () => {
            if (!confirm('永久删除所有数据？不可恢复！')) return;
            await _supabase.from('public_profiles').update({ deleted_at: new Date().toISOString() }).eq('id', currentUser.id);
            await _supabase.auth.signOut();
            currentUser = null;
            render();
        });
    }

    // 管理员面板
    async function renderAdminView() {
        const { data: users } = await _supabase.from('public_profiles').select('*').is('deleted_at', null);
        const { data: ann } = await _supabase.from('announcements').select('content').order('created_at', { ascending: false }).limit(1);
        const currentAnn = ann?.[0]?.content || '';
        return `
            <div class="card"><h3>编辑公告</h3><textarea id="admin-announcement" rows="2">${escapeHtml(currentAnn)}</textarea><button id="save-announcement">保存公告</button></div>
            <div class="card"><h3>用户管理</h3><table style="width:100%"><tr><th>用户名</th><th>管理员</th><th>禁言</th><th>操作</th></tr>
            ${users?.map(u => `
                <tr>
                    <td>${escapeHtml(u.display_name)}</td>
                    <td>${u.is_admin ? '是' : `<button class="set-admin" data-id="${u.id}">设为管理员</button>`}</td>
                    <td>${u.is_muted ? '已禁言' : `<button class="toggle-mute" data-id="${u.id}">禁言</button>`}</td>
                    <td><button class="admin-del" data-id="${u.id}">删除</button></td>
                </tr>
            `).join('')}</table></div>
            <div class="card"><h3>创建新用户</h3><input id="new-admin-name" placeholder="用户名"><input id="new-admin-pwd" placeholder="密码"><button id="admin-create-user">创建</button></div>
        `;
    }

    function attachAdminEvents() {
        document.getElementById('save-announcement')?.addEventListener('click', async () => {
            const content = document.getElementById('admin-announcement').value;
            if (!content) return;
            await _supabase.from('announcements').delete().neq('id', '00000000-0000-0000-0000-000000000000');
            await _supabase.from('announcements').insert({ content, created_by: currentUser.id });
            alert('公告已更新');
            render();
        });
        document.querySelectorAll('.set-admin').forEach(btn => {
            btn.onclick = async () => { await _supabase.from('public_profiles').update({ is_admin: true }).eq('id', btn.dataset.id); render(); };
        });
        document.querySelectorAll('.toggle-mute').forEach(btn => {
            btn.onclick = async () => { await _supabase.from('public_profiles').update({ is_muted: true }).eq('id', btn.dataset.id); render(); };
        });
        document.querySelectorAll('.admin-del').forEach(btn => {
            btn.onclick = async () => { await _supabase.from('public_profiles').update({ deleted_at: new Date().toISOString() }).eq('id', btn.dataset.id); render(); };
        });
        document.getElementById('admin-create-user')?.addEventListener('click', async () => {
            const username = document.getElementById('new-admin-name').value.trim();
            const pwd = document.getElementById('new-admin-pwd').value;
            if (!username || !pwd) return;
            const randomEmail = crypto.randomUUID() + EMAIL_SUFFIX;
            const { data, error } = await _supabase.auth.signUp({ email: randomEmail, password: pwd });
            if (error) { alert(error.message); return; }
            if (data.user) {
                await _supabase.from('public_profiles').insert({ id: data.user.id, email: randomEmail, display_name: username });
                alert('创建成功');
                render();
            }
        });
    }

    async function checkSession() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session?.user) {
            currentUser = session.user;
            const { data: profile } = await _supabase.from('public_profiles').select('display_name').eq('id', currentUser.id).maybeSingle();
            await ensureProfile(currentUser, profile?.display_name || 'user');
        }
        render();
        // 确保退出按钮在渲染后绑定（因为退出按钮在top-nav中，而top-nav在render中生成）
        setTimeout(() => {
            const logoutBtn = document.getElementById('logout-top');
            if (logoutBtn) {
                logoutBtn.onclick = async () => {
                    await _supabase.auth.signOut();
                    currentUser = null;
                    currentProfile = null;
                    if (messagesSubscription) messagesSubscription.unsubscribe();
                    render();
                };
            }
        }, 100);
    }
    checkSession();
</script>
</body>
</html>
